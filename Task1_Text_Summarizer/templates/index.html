<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Text Summarizer</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>🤖 AI Text Summarizer</h1>

    <p class="subtitle">
        Transform lengthy articles into concise, meaningful summaries using Artificial Intelligence.
    </p>

    <form method="POST">

        <textarea
            name="text"
            placeholder="Paste your article, blog, report or any lengthy text here..."
            required></textarea>

        <button type="submit">
            ✨ Generate Summary
        </button>

    </form>

    {% if summary %}

    <div class="result">

        <h2>📄 Summary</h2>

        <p>{{ summary }}</p>

    </div>

    {% endif %}

    

</div>

</body>

</html>
